name: Stage the app

on:
  pull_request:
    types: [labeled]

env:
  AZURE_WEBAPP_NAME: margobilyk-ttt-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'stage')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ghcr.io/${{ github.repository }}/ttt:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}/ttt:${{ github.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group cd-with-actions \
            --docker-custom-image-name ghcr.io/${{ github.repository }}/ttt:${{ github.sha }} \
            --docker-registry-server-url https://ghcr.io \
            --docker-registry-server-user ${{ github.actor }} \
            --docker-registry-server-password ${{ secrets.GITHUB_TOKEN }}
